<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>歩きお散歩ガチャ</title>
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 fill=%22%234b6cb7%22/><text y=%22.9em%22 x=%225%22 font-size=%2280%22>🌍</text></svg>">
    <style>
        body { font-family: -apple-system, sans-serif; background: linear-gradient(180deg, #a1c4fd 0%, #c2e9fb 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: white; width: 85%; max-width: 350px; padding: 30px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        h1 { color: #2c3e50; font-size: 1.5rem; margin-bottom: 25px; }
        .label { font-size: 0.85rem; font-weight: bold; color: #555; margin-bottom: 5px; display: block; text-align: left;}
        select { width: 100%; padding: 15px; font-size: 1rem; border: 2px solid #eee; border-radius: 12px; margin-bottom: 20px; background: #fafafa; -webkit-appearance: none; }
        button { background: #4b6cb7; color: white; border: none; padding: 20px; border-radius: 20px; font-size: 1.2rem; font-weight: bold; width: 100%; box-shadow: 0 4px 15px rgba(75, 108, 183, 0.3); }
        button:active { transform: scale(0.98); opacity: 0.9; }
        .info { font-size: 0.75rem; color: #7f8c8d; margin-top: 15px; }
    </style>
</head>
<body>

<div class="card">
    <h1>🌍 お散歩ガチャ</h1>
    
    <span class="label">🚶‍♂️ ペース</span>
    <select id="speedSelect">
        <option value="3.0">ゆっくり (3km/h)</option>
        <option value="4.5" selected>ふつう (4.5km/h)</option>
        <option value="5.5">早歩き (5.5km/h)</option>
    </select>

    <span class="label">⏱ 時間 (往復)</span>
    <select id="timeSelect">
        <option value="10">10分</option>
        <option value="20">20分</option>
        <option value="30" selected>30分</option>
        <option value="40">40分</option>
        <option value="50">50分</option>
        <option value="60">60分</option>
    </select>
    
    <button onclick="generateWalk()">ルートを作成！</button>
    <p class="info">※毎回違う方角へルートを引きます</p>
</div>

<script>
    function generateWalk() {
        if (!navigator.geolocation) {
            alert("GPSを有効にしてください");
            return;
        }

        const btn = document.querySelector('button');
        btn.innerText = "探索中...";

        navigator.geolocation.getCurrentPosition((position) => {
            const lat = position.coords.latitude;
            const lng = position.coords.longitude;
            
            const speed = parseFloat(document.getElementById('speedSelect').value);
            const minutes = parseInt(document.getElementById('timeSelect').value);
            
            // 片道の距離(km)
            const distanceKm = (speed * (minutes / 60)) / 2;
            
            // 360度ランダムな方向（完全にランダムにするため現在時刻のミリ秒を使用）
            const angle = Math.random() * 360;
            
            // 緯度・経度の移動量を計算
            const dLat = (distanceKm * Math.cos(angle * Math.PI / 180)) / 111;
            const dLng = (distanceKm * Math.sin(angle * Math.PI / 180)) / (111 * Math.cos(lat * Math.PI / 180));
            
            const destLat = lat + dLat;
            const destLng = lng + dLng;

            // 【超重要】Googleマップに「この座標そのもの」を目的地と認識させる形式
            // `ll`パラメータで座標を固定し、`dir`で経路を表示
            const mapUrl = `https://www.google.com/maps/dir/?api=1&destination=${destLat},${destLng}&travelmode=walking`;
            
            window.location.href = mapUrl;
            
            setTimeout(() => { btn.innerText = "ルートを作成！"; }, 1000);

        }, (error) => {
            alert("位置情報を取得できませんでした。");
            btn.innerText = "ルートを作成！";
        }, { enableHighAccuracy: true });
    }
</script>

</body>
</html>
