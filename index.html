<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>歩きお散歩ガチャ</title>
    
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 fill=%22%234b6cb7%22/><text y=%22.9em%22 x=%225%22 font-size=%2280%22>🌍</text></svg>">

    <style>
        body { 
            font-family: -apple-system, sans-serif; 
            background: linear-gradient(180deg, #a1c4fd 0%, #c2e9fb 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; margin: 0; 
        }
        .card { 
            background: white; width: 85%; max-width: 350px; padding: 30px; 
            border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center;
        }
        h1 { color: #2c3e50; font-size: 1.5rem; margin-bottom: 25px; }
        .label { font-size: 0.9rem; font-weight: bold; color: #555; margin-bottom: 5px; display: block; text-align: left;}
        select { 
            width: 100%; padding: 15px; font-size: 1rem; border: 2px solid #eee; 
            border-radius: 15px; margin-bottom: 20px; background: #fafafa;
        }
        button { 
            background: #2c3e50; color: white; border: none; padding: 20px; 
            border-radius: 20px; font-size: 1.2rem; font-weight: bold; width: 100%; 
        }
        .info { font-size: 0.8rem; color: #666; margin-top: 15px; }
    </style>
</head>
<body>

<div class="card">
    <h1>🌍 お散歩ガチャ</h1>
    
    <span class="label">🚶‍♂️ ペース</span>
    <select id="speedSelect">
        <option value="3">ゆっくり</option>
        <option value="4" selected>ふつう</option>
        <option value="5">早歩き</option>
    </select>

    <span class="label">⏱ 時間</span>
    <select id="timeSelect">
        <option value="15">15分</option>
        <option value="30" selected>30分</option>
        <option value="45">45分</option>
        <option value="60">60分</option>
    </select>
    
    <button onclick="generateWalk()">目的地を検索！</button>
    <p class="info">名前のある場所を優先して探します</p>
</div>

<script>
    function generateWalk() {
        if (!navigator.geolocation) {
            alert("GPSが使えません");
            return;
        }

        navigator.geolocation.getCurrentPosition((position) => {
            const lat = position.coords.latitude;
            const lng = position.coords.longitude;
            
            const speed = parseFloat(document.getElementById('speedSelect').value);
            const minutes = parseInt(document.getElementById('timeSelect').value);
            const distanceKm = (speed * (minutes / 60)) / 2;
            
            const angle = Math.random() * 360;
            const dLat = (distanceKm * Math.cos(angle * Math.PI / 180)) / 111;
            const dLng = (distanceKm * Math.sin(angle * Math.PI / 180)) / (111 * Math.cos(lat * Math.PI / 180));
            
            const destLat = lat + dLat;
            const destLng = lng + dLng;

            // 【ポイント】検索モード(search)を使用
            // 近傍の「名前のある場所」をGoogleMapに探させるURL
            // 地点だけでなく、周辺の面白い場所を勝手にターゲットにしてくれます
            const mapUrl = `https://www.google.com/maps/search/?api=1&query=${destLat},${destLng}`;
            
            window.location.href = mapUrl;

        }, () => {
            alert("位置情報を許可してください");
        });
    }
</script>

</body>
</html>
